[profile.default]
solc_version = "0.8.34"
ffi = true

evm_version = "cancun"       # TLOAD/TSTORE for ~150k gas savings per tx on callback params
# via_ir commented out — Huff is pre-compiled; via_ir causes stack-too-deep on large hex constants in deploy scripts
optimizer = true
optimizer_runs = 20000         # Balanced for deployment + runtime gas

# --- Metadata / Determinism ---
cbor_metadata = false        # Remove CBOR metadata
bytecode_hash = "none"       # Remove IPFS hash → deterministic bytecode

# --- Paths ---
src = "src"
out = "out"
libs = ["lib"]

# --- RPC (optional) ---
# Leave the default profile RPC-free so pure unit tests run locally.
# Pass `--rpc-url` (or use a separate profile) only for forked tests/scripts.
